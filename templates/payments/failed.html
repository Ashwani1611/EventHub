{% extends "base.html" %}

{% block title %}Payment Failed — EventHub{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 text-center">
        <div class="card p-5">
            <i class="bi bi-x-circle-fill text-danger display-1"></i>
            <h3 class="fw-bold mt-3">Payment Failed</h3>
            <p class="text-muted">Something went wrong. Your seat has not been reserved.</p>
            <a href="/events/{{ booking.seat.event.id }}/" class="btn btn-primary mt-2">Try Again</a>
            <a href="/" class="btn btn-outline-secondary mt-2">Back to Events</a>
        </div>
    </div>
</div>
{% endblock %}
