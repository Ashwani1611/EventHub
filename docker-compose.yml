

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: eventhub_db
      POSTGRES_USER: eventhub_user
      POSTGRES_PASSWORD: Kumar123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    env_file:
      - .env

volumes:
  postgres_data: